apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: qwen-guard-vllm
  annotations:
    scenarios.ai.sap.com/description: "Qwen3 Guard vLLM Server"
    scenarios.ai.sap.com/name: "qwen-guard-vllm"
    executables.ai.sap.com/description: "Qwen3 Guard vLLM inference"
    executables.ai.sap.com/name: "qwen-guard-vllm"
  labels:
    scenarios.ai.sap.com/id: "qwen-guard-vllm"
    ai.sap.com/version: "0.0.1"
spec:
  inputs:
    parameters: []
    artifacts: []
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/metric: concurrency
        autoscaling.knative.dev/target: 1
        autoscaling.knative.dev/targetBurstCapacity: 0
      labels: |
        ai.sap.com/resourcePlan: infer.l
    spec: |
      predictor:
        imagePullSecrets:
          - name: docker-registry-secret
        minReplicas: 1
        maxReplicas: 1
        containers:
          - name: kserve-container
            image: docker.io/lokeshr11/qwen-guard-vllm:latest
            ports:
              - containerPort: 8000
                protocol: TCP
